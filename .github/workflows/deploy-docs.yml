name: Documentation
on:
    push:
        branches:
            - master
        paths:
            - .github/workflows/docs.yml
            - docs/
            - zensical.toml
    workflow_dispatch:
permissions:
    contents: read
    pages: write
    id-token: write
jobs:
    deploy:
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/configure-pages@v6
            - uses: actions/checkout@v6
            - uses: actions/setup-python@v6
              with:
                  python-version: 3.x
            - run: pip install zensical
            - run: zensical build --clean
            - name: nest site
              run: |
                  mkdir -p _site/umn/signalis
                  cp -r site/. _site/umn/signalis
            - uses: actions/upload-pages-artifact@v5
              with:
                  path: _site
            - uses: actions/deploy-pages@v5
              id: deployment
